<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Castle Defender — Admin</title>
  <link rel="stylesheet" href="/admin.css">
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>⚙ Admin Dashboard</h1>
    <p>Authenticate to continue.</p>

    <div class="login-tabs">
      <button class="login-tab active" id="ltab-secret" onclick="setLoginMode('secret')">Secret Key</button>
      <button class="login-tab" id="ltab-email" onclick="setLoginMode('email')">Email &amp; Password</button>
    </div>

    <div id="login-secret-form">
      <div class="form-group">
        <label>Admin Secret</label>
        <input type="password" id="login-secret" placeholder="ADMIN_SECRET value"
          autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
    </div>

    <div id="login-email-form" class="hidden">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="admin@example.com"
          onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Password"
          autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <p class="text-muted" style="font-size:11px;margin-bottom:12px">
        First time? Use <code>POST /admin/setup</code> with your ADMIN_SECRET to create the first admin account.
      </p>
    </div>

    <button class="btn-primary w100" onclick="doLogin()">Sign In</button>
    <p id="login-err" class="text-danger mt8" style="font-size:12px"></p>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">
  <header>
    <span class="logo">⚔ Castle Defender Admin</span>
    <span class="live-dot" id="live-dot"></span>
    <span id="live-label" class="text-muted" style="font-size:12px">—</span>
    <span class="spacer"></span>
    <span id="admin-identity" class="text-muted" style="font-size:12px"></span>
    <button class="btn-sm" onclick="refreshCurrent()">↻ Refresh</button>
    <button class="btn-sm" onclick="doLogout()">Logout</button>
  </header>

  <nav>
    <a href="#" class="active" data-tab="dashboard"><span class="icon">📊</span> Dashboard</a>
    <a href="#" data-tab="players"><span class="icon">👤</span> Players</a>
    <a href="#" data-tab="anticheat"><span class="icon">🛡</span> Anti-cheat</a>
    <a href="#" data-tab="matches"><span class="icon">⚔</span> Matches</a>
    <a href="#" data-tab="analytics"><span class="icon">📈</span> Analytics</a>
    <a href="#" data-tab="config"><span class="icon">🎮</span> Config</a>
    <a href="#" data-tab="ops"><span class="icon">🔧</span> Ops</a>
    <a href="#" data-tab="audit"><span class="icon">📋</span> Audit Log</a>
    <a href="#" data-tab="team" id="nav-team" class="hidden"><span class="icon">👥</span> Admin Team</a>
  </nav>

  <main id="main-content">
    <p class="load">Loading…</p>
  </main>
</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title">Detail</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="/admin.js"></script>
</body>
</html>
