<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Castle Defender — Multiplayer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- LOBBY OVERLAY — visible until match starts -->
  <div id="lobby">
    <div class="lobby-card">
      <h1>Castle Defender</h1>
      <p class="subtitle">PvP Tower Defense</p>

      <!-- Mode selector tabs -->
      <div id="mode-selector">
        <button class="mode-tab active" id="btn-tab-classic">Classic 2P</button>
        <button class="mode-tab" id="btn-tab-multilane">Multi-Lane</button>
      </div>

      <!-- Decorative separator -->
      <div class="lobby-separator">&#x2694;</div>

      <!-- CLASSIC section -->
      <div id="lobby-classic-section">
        <!-- CREATE section -->
        <div class="lobby-section">
          <button class="lobby-btn primary" id="btn-create">&#x2694; Create Room</button>
        </div>

        <div class="lobby-divider">OR</div>

        <!-- JOIN section -->
        <div class="lobby-section">
          <label for="join-name-input">Your Name</label>
          <input id="join-name-input" type="text" maxlength="20"
                 placeholder="Player" autocomplete="off" spellcheck="false">
          <label for="join-code-input">Room Code</label>
          <input id="join-code-input" type="text" maxlength="6"
                 placeholder="XXXXXX" autocomplete="off" spellcheck="false">
          <button class="lobby-btn secondary" id="btn-join">&#x1F6E1; Join Room</button>
        </div>

        <!-- Room code display (shown after Create Room) -->
        <div id="room-code-row" style="display:none">
          <div id="room-code-display"></div>
          <button class="lobby-btn secondary small" id="btn-copy-code" type="button">Copy Code</button>
          <button class="lobby-btn secondary small" id="btn-copy-link" type="button">Copy Link</button>
        </div>
      </div>

      <!-- MULTI-LANE section -->
      <div id="lobby-ml-section" style="display:none">
        <div class="lobby-section">
          <label for="ml-name-input">Your Name</label>
          <input id="ml-name-input" type="text" maxlength="20"
                 placeholder="Player" autocomplete="off" spellcheck="false">
        </div>
        <div class="lobby-section">
          <button class="lobby-btn primary" id="btn-create-ml">&#x2694; Create ML Room</button>
        </div>
        <div class="lobby-divider">OR</div>
        <div class="lobby-section">
          <label for="ml-join-code-input">Room Code</label>
          <input id="ml-join-code-input" type="text" maxlength="6"
                 placeholder="XXXXXX" autocomplete="off" spellcheck="false">
          <button class="lobby-btn secondary" id="btn-join-ml">&#x1F6E1; Join ML Room</button>
        </div>
      </div>

      <!-- ML lobby waiting panel (shown after create/join) -->
      <div id="ml-lobby-panel" style="display:none">
        <div class="ml-lobby-title">Waiting for players&hellip;</div>
        <ul id="ml-player-list"></ul>
        <div class="lobby-section" style="margin-top:10px">
          <button class="lobby-btn primary" id="btn-ready-ml">&#x2714; Ready</button>
        </div>
        <div class="lobby-section" style="margin-top:6px">
          <button class="lobby-btn secondary" id="btn-force-start-ml" style="display:none">&#x25BA; Force Start</button>
        </div>
        <!-- ML room code display -->
        <div id="ml-room-code-row" style="display:none; margin-top:8px">
          <div id="ml-room-code-display"></div>
          <button class="lobby-btn secondary small" id="btn-copy-ml-code" type="button">Copy Code</button>
          <button class="lobby-btn secondary small" id="btn-copy-ml-link" type="button">Copy Link</button>
        </div>
      </div>

      <!-- Status / error line -->
      <div id="lobby-status"></div>

      <!-- Version tag -->
      <div class="lobby-version">v1.0</div>
    </div>
  </div>

  <!-- GAME CANVAS — hidden until match_ready -->
  <div id="game-canvas-wrap">
    <canvas id="game-canvas"></canvas>
    <div id="game-ui">
      <div id="hud-bar">
        <span>&#x1FA99; <strong id="hud-gold">0</strong></span>
        <span>&#x2191; <strong id="hud-income">0</strong></span>
        <span>&#x23F1; <strong id="hud-income-timer">0s</strong></span>
      </div>
      <div id="matchup-panel"></div>
      <div id="send-bar">
        <div class="bar-label">Units</div>
        <button class="action-btn send-btn" data-unit-type="footman">1 Footman</button>
        <button class="action-btn send-btn" data-unit-type="bowman">2 Bowman</button>
        <button class="action-btn send-btn" data-unit-type="ironclad">3 Ironclad</button>
        <button class="action-btn send-btn" data-unit-type="runner">4 Runner</button>
        <button class="action-btn send-btn" data-unit-type="warlock">5 Warlock</button>
      </div>
      <div id="defense-bar">
        <div class="bar-label">Towers</div>
        <button class="action-btn defense-btn" draggable="true" data-tower-type="archer">Archer</button>
        <button class="action-btn defense-btn" draggable="true" data-tower-type="fighter">Fighter</button>
        <button class="action-btn defense-btn" draggable="true" data-tower-type="ballista">Ballista</button>
        <button class="action-btn defense-btn" draggable="true" data-tower-type="cannon">Cannon</button>
        <button class="action-btn defense-btn" draggable="true" data-tower-type="mage">Mage</button>
      </div>
      <div id="tower-slots">
        <div class="tower-slot" data-slot="left_outer"></div>
        <div class="tower-slot" data-slot="left_mid"></div>
        <div class="tower-slot" data-slot="left_inner"></div>
        <div class="tower-slot" data-slot="right_inner"></div>
        <div class="tower-slot" data-slot="right_mid"></div>
        <div class="tower-slot" data-slot="right_outer"></div>
      </div>
      <div id="tower-popout" style="display:none"></div>
      <div id="action-feedback"></div>
      <div id="game-over-banner" style="display:none"></div>
      <div id="spectator-badge" style="display:none">SPECTATING</div>
      <div id="stats-panel"></div>

      <!-- ML Barracks HUD (shown only in ML mode) -->
      <div id="ml-barracks-hud" style="display:none">
        <span id="ml-barracks-label">Barracks Lv<strong id="ml-barracks-level">1</strong></span>
        <button id="btn-ml-barracks-upgrade" class="lobby-btn secondary small">Upgrade</button>
      </div>

      <!-- Lane navigation bar (shown only in ML mode) -->
      <div id="ml-lane-nav" style="display:none">
        <button id="btn-ml-prev-lane">&#x25C4;</button>
        <span id="ml-viewing-label">My Lane</span>
        <button id="btn-ml-next-lane">&#x25BA;</button>
      </div>

      <!-- ML tile interaction popout (wall convert / tower upgrade) -->
      <div id="ml-tile-menu" style="display:none"></div>
    </div>
  </div>

  <!-- Socket.IO client — version pinned to match server/package.json socket.io@4.8.3 -->
  <script src="https://cdn.socket.io/4.8.3/socket.io.min.js" crossorigin="anonymous"></script>
  <script src="game.js?v=20260302c"></script>

</body>
</html>
