<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Compendium · Ransom Forge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

:root {
  --bg:     #07090e;
  --panel:  #080b12;
  --stone:  #2c2f38;
  --stone2: #1e2128;
  --stone3: #383c48;
  --gold:   #e8a828;
  --gold2:  #b07010;
  --gold3:  #7a4e08;
  --blue:   #3a90ff;
  --blue2:  #1a4080;
  --red:    #ff3a3a;
  --green:  #28d060;
  --teal:   #28c0b0;
  --purple: #b060ff;
  --orange: #f07030;
  --text:   #bcd0e0;
  --muted:  #445868;
  --muted2: #252d38;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scrollbar-width: thin; scrollbar-color: var(--muted2) var(--bg); }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 18px;
  background: rgba(6,8,13,0.98);
  border-bottom: 1px solid var(--muted2);
  position: sticky;
  top: 0;
  z-index: 100;
}

.hdr-back {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  text-decoration: none;
  padding: 3px 8px;
  border: 1px solid var(--muted2);
  border-radius: 3px;
  transition: color 0.12s, border-color 0.12s;
}
.hdr-back:hover { color: var(--text); border-color: var(--stone3); }

h1 {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

#hdr-count {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  margin-left: auto;
}

/* ── Filters ── */
#filters {
  position: sticky;
  top: 41px;
  z-index: 90;
  background: rgba(7,9,14,0.97);
  border-bottom: 1px solid var(--muted2);
  padding: 8px 18px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}

.search-wrap {
  display: flex;
  align-items: center;
  background: var(--panel);
  border: 1px solid var(--muted2);
  border-radius: 4px;
  padding: 4px 8px;
  gap: 5px;
  flex: 0 1 200px;
}
.search-wrap:focus-within { border-color: var(--blue2); }

#search {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.68rem;
  width: 100%;
}
#search::placeholder { color: var(--muted); }

.filter-group {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.5rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding-right: 2px;
}

.pill {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem;
  padding: 3px 9px;
  border: 1px solid var(--muted2);
  border-radius: 20px;
  background: none;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.pill:hover { color: var(--text); border-color: var(--stone3); }
.pill.active         { background: rgba(232,168,40,0.1);  border-color: var(--gold2); color: var(--gold); }
.pill.active.r-blue  { background: rgba(58,144,255,0.1);  border-color: var(--blue2); color: var(--blue); }
.pill.active.r-teal  { background: rgba(40,192,176,0.1);  border-color: var(--teal);  color: var(--teal); }

/* ── Grid ── */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
  gap: 8px;
  padding: 14px 18px;
  max-width: 1200px;
  margin: 0 auto;
}

/* ── Unit card ── */
.ucard {
  background: var(--panel);
  border: 1px solid var(--muted2);
  border-radius: 6px;
  padding: 10px 8px 8px;
  cursor: pointer;
  transition: border-color 0.12s, background 0.12s, transform 0.08s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  text-align: center;
  outline: none;
}
.ucard:hover, .ucard:focus-visible {
  transform: translateY(-2px);
}
.ucard.attacker { border-color: rgba(232,168,40,0.2); }
.ucard.attacker:hover, .ucard.attacker:focus-visible { border-color: var(--gold2); background: rgba(232,168,40,0.04); }
.ucard.defender { border-color: rgba(58,144,255,0.2); }
.ucard.defender:hover, .ucard.defender:focus-visible { border-color: var(--blue);  background: rgba(58,144,255,0.04); }
.ucard.hybrid   { border-color: rgba(40,192,176,0.2); }
.ucard.hybrid:hover,   .ucard.hybrid:focus-visible   { border-color: var(--teal);  background: rgba(40,192,176,0.04); }

.uavatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 1.3rem;
  font-weight: 700;
  border: 2px solid var(--muted2);
  flex-shrink: 0;
  overflow: hidden;
}
.uavatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

.uname {
  font-family: 'Cinzel', serif;
  font-size: 0.57rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.04em;
  line-height: 1.2;
}

.rbadge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.46rem;
  padding: 1px 6px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.rbadge.attacker { background: rgba(232,168,40,0.12); color: var(--gold); }
.rbadge.defender { background: rgba(58,144,255,0.12); color: var(--blue); }
.rbadge.hybrid   { background: rgba(40,192,176,0.12); color: var(--teal); }

.type-row { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; }

.ttag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.42rem;
  padding: 1px 5px;
  border-radius: 3px;
  text-transform: uppercase;
}

.uhp {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.5rem;
  color: var(--green);
}

/* ── Empty / error ── */
#empty {
  display: none;
  grid-column: 1 / -1;
  text-align: center;
  padding: 52px 24px;
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.72rem;
  line-height: 2;
}

/* ── Skeletons ── */
.skel {
  background: linear-gradient(90deg, var(--panel) 0%, var(--muted2) 50%, var(--panel) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius: 6px;
  height: 136px;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── Detail backdrop ── */
#backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(3,5,9,0.88);
  z-index: 200;
  backdrop-filter: blur(3px);
  align-items: center;
  justify-content: center;
}
#backdrop.open { display: flex; }

/* ── Detail panel ── */
#det-panel {
  background: var(--panel);
  border: 1px solid var(--stone3);
  border-radius: 8px;
  width: min(480px, 92vw);
  max-height: 90vh;
  overflow-y: auto;
  padding: 20px;
  position: relative;
  box-shadow: 0 8px 40px rgba(0,0,0,0.7);
  scrollbar-width: thin;
  scrollbar-color: var(--muted2) transparent;
}

.det-close {
  position: absolute;
  top: 10px;
  right: 12px;
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.68rem;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 3px;
  transition: color 0.12s;
}
.det-close:hover { color: var(--text); }

.det-hdr {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
  padding-right: 36px;
}

.det-avatar {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 1.6rem;
  font-weight: 700;
  border: 2px solid var(--muted2);
  flex-shrink: 0;
  overflow: hidden;
}
.det-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

.det-title-name {
  font-family: 'Cinzel', serif;
  font-size: 1.08rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.05em;
  margin-bottom: 5px;
}

.det-badges { display: flex; gap: 5px; flex-wrap: wrap; }

.det-desc {
  font-size: 0.84rem;
  color: var(--muted);
  line-height: 1.65;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--muted2);
}

.sec-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.5rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 7px;
}

.stat-rows { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }

.stat-row { display: flex; align-items: center; gap: 8px; }

.stat-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem;
  color: var(--muted);
  width: 76px;
  flex-shrink: 0;
}

.stat-bar {
  flex: 1;
  height: 4px;
  background: var(--muted2);
  border-radius: 2px;
  overflow: hidden;
}
.stat-bar-fill { height: 100%; border-radius: 2px; }

.stat-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem;
  color: var(--text);
  width: 44px;
  text-align: right;
  flex-shrink: 0;
}

.det-costs {
  display: flex;
  gap: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--muted2);
  flex-wrap: wrap;
}

.cost-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }

.cost-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.46rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.cost-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.82rem;
  font-weight: 700;
}
</style>
</head>
<body>

<header>
  <a class="hdr-back" href="/">← BACK</a>
  <h1>Unit Compendium</h1>
  <span id="hdr-count"></span>
</header>

<div id="filters">
  <div class="search-wrap">
    <span style="color:var(--muted);font-size:0.7rem;">⌕</span>
    <input id="search" type="text" placeholder="Search units…" autocomplete="off" spellcheck="false">
  </div>

  <div class="filter-group">
    <span class="filter-lbl">Role</span>
    <button class="pill active"          data-f="role" data-v="">All</button>
    <button class="pill"                 data-f="role" data-v="attacker">⚔ Attacker</button>
    <button class="pill r-blue"          data-f="role" data-v="defender">🛡 Defender</button>
    <button class="pill r-teal"          data-f="role" data-v="hybrid">⚡ Hybrid</button>
  </div>

  <div class="filter-group">
    <span class="filter-lbl">Damage</span>
    <button class="pill active"          data-f="damage_type" data-v="">All</button>
    <button class="pill"                 data-f="damage_type" data-v="NORMAL">Normal</button>
    <button class="pill"                 data-f="damage_type" data-v="PIERCE">Pierce</button>
    <button class="pill"                 data-f="damage_type" data-v="MAGIC">Magic</button>
    <button class="pill"                 data-f="damage_type" data-v="PHYSICAL">Physical</button>
    <button class="pill"                 data-f="damage_type" data-v="SPLASH">Splash</button>
    <button class="pill"                 data-f="damage_type" data-v="SIEGE">Siege</button>
  </div>
</div>

<div id="grid"></div>

<div id="backdrop" onclick="onBackdropClick(event)">
  <div id="det-panel">
    <button class="det-close" onclick="closeDetail()">✕ ESC</button>
    <div id="det-body"></div>
  </div>
</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────────
let allUnits = [];
const filters = { role: '', damage_type: '' };
let searchQ = '';

// ── Lookup maps ────────────────────────────────────────────────────────────────
const DMG_COLOR = {
  NORMAL:   '#8090a0',
  PIERCE:   '#e8c820',
  MAGIC:    '#b060ff',
  PHYSICAL: '#f07030',
  SPLASH:   '#ff5040',
  SIEGE:    '#c09050',
  TRUE:     '#d0e0e0',
};

const ARM_COLOR = {
  UNARMORED: '#607080',
  LIGHT:     '#28d060',
  MEDIUM:    '#e8a828',
  HEAVY:     '#3a90ff',
  MAGIC:     '#b060ff',
};

// Normalised [min, max] for stat bar display
const STAT_RANGE = {
  hp:            [0, 400],
  attack_damage: [0, 30],
  attack_speed:  [0, 2.5],
  range:         [0, 0.6],
  path_speed:    [0, 0.08],
};
const STAT_LABEL = {
  hp:            'HP',
  attack_damage: 'Attack',
  attack_speed:  'Atk Spd',
  range:         'Range',
  path_speed:    'Move Spd',
};
const STAT_COLOR = {
  hp:            '#28d060',
  attack_damage: '#ff5040',
  attack_speed:  '#e8a828',
  range:         '#3a90ff',
  path_speed:    '#28c0b0',
};

// ── Helpers ────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function avatarStyle(role) {
  if (role === 'attacker') return 'background:rgba(232,168,40,0.12);color:var(--gold);border-color:var(--gold3);';
  if (role === 'defender') return 'background:rgba(58,144,255,0.12);color:var(--blue);border-color:var(--blue2);';
  return 'background:rgba(40,192,176,0.12);color:var(--teal);border-color:#1a6060;';
}

function roleLabel(role) {
  if (role === 'attacker') return '⚔ Attacker';
  if (role === 'defender') return '🛡 Defender';
  return '⚡ Hybrid';
}

function typeTag(val, colorMap) {
  const c = colorMap[val] || '#606878';
  return `<span class="ttag" style="background:${c}18;color:${c};border:1px solid ${c}28;">${esc(val)}</span>`;
}

function statPct(field, val) {
  const [lo, hi] = STAT_RANGE[field] || [0, 100];
  return Math.min(100, Math.max(0, ((val - lo) / (hi - lo)) * 100));
}

function avatarContent(unit) {
  if (unit.icon_url)
    return `<img src="${esc(unit.icon_url)}" alt="${esc(unit.name)}" loading="lazy">`;
  return esc((unit.name || '?')[0].toUpperCase());
}

// ── Fetch ──────────────────────────────────────────────────────────────────────
async function loadUnits() {
  showSkeletons();
  try {
    const r = await fetch('/api/lobby/units');
    if (!r.ok) throw new Error('Request failed');
    const data = await r.json();
    allUnits = data.units || [];
    render();
  } catch {
    document.getElementById('grid').innerHTML =
      '<div id="empty" style="display:block">Could not load unit data. Please try again.</div>';
  }
}

function showSkeletons() {
  document.getElementById('grid').innerHTML =
    Array.from({ length: 12 }, () => '<div class="skel"></div>').join('');
}

// ── Filter + render ────────────────────────────────────────────────────────────
function visible() {
  let out = allUnits;
  if (searchQ) {
    const q = searchQ.toLowerCase();
    out = out.filter(
      (u) =>
        (u.name || '').toLowerCase().includes(q) ||
        (u.description || '').toLowerCase().includes(q)
    );
  }
  if (filters.role)        out = out.filter((u) => u.role === filters.role);
  if (filters.damage_type) out = out.filter((u) => u.damage_type === filters.damage_type);
  return out;
}

function render() {
  const units = visible();
  const grid  = document.getElementById('grid');
  document.getElementById('hdr-count').textContent =
    `${units.length} / ${allUnits.length} units`;

  if (!units.length) {
    grid.innerHTML = '<div id="empty" style="display:block">No units match your filters.</div>';
    return;
  }

  grid.innerHTML = units.map((u) => `
    <div class="ucard ${esc(u.role)}" data-key="${esc(u.key)}" tabindex="0" role="button"
         aria-label="${esc(u.name)}">
      <div class="uavatar" style="${avatarStyle(u.role)}">${avatarContent(u)}</div>
      <div class="uname">${esc(u.name)}</div>
      <span class="rbadge ${esc(u.role)}">${roleLabel(u.role)}</span>
      <div class="type-row">
        ${typeTag(u.damage_type, DMG_COLOR)}
        ${typeTag(u.armor_type,  ARM_COLOR)}
      </div>
      <div class="uhp">♥ ${u.hp}</div>
    </div>
  `).join('');

  grid.querySelectorAll('.ucard').forEach((card) => {
    card.addEventListener('click', () => openDetail(card.dataset.key));
    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') openDetail(card.dataset.key);
    });
  });
}

// ── Detail panel ───────────────────────────────────────────────────────────────
function openDetail(key) {
  const u = allUnits.find((x) => x.key === key);
  if (!u) return;

  const statFields = ['hp', 'attack_damage', 'attack_speed', 'range', 'path_speed']
    .filter((f) => u[f] != null);

  const statsHtml = statFields.map((f) => {
    const pct = statPct(f, u[f]);
    const col = STAT_COLOR[f] || '#8090a0';
    const display =
      f === 'path_speed'    ? u[f].toFixed(3) :
      f === 'attack_speed'  ? u[f].toFixed(1) :
      f === 'attack_damage' ? u[f].toFixed(1) :
      u[f];
    return `
      <div class="stat-row">
        <span class="stat-lbl">${STAT_LABEL[f] || f}</span>
        <div class="stat-bar">
          <div class="stat-bar-fill" style="width:${pct}%;background:${col};"></div>
        </div>
        <span class="stat-val">${display}</span>
      </div>`;
  }).join('');

  const costParts = [];
  if ((u.send_cost  ?? 0) > 0) costParts.push(
    `<div class="cost-item">
      <span class="cost-lbl">Send Cost</span>
      <span class="cost-val" style="color:var(--gold)">💰 ${u.send_cost}</span>
    </div>`
  );
  if ((u.build_cost ?? 0) > 0) costParts.push(
    `<div class="cost-item">
      <span class="cost-lbl">Build Cost</span>
      <span class="cost-val" style="color:var(--blue)">🔧 ${u.build_cost}</span>
    </div>`
  );

  document.getElementById('det-body').innerHTML = `
    <div class="det-hdr">
      <div class="det-avatar" style="${avatarStyle(u.role)}">${avatarContent(u)}</div>
      <div>
        <div class="det-title-name">${esc(u.name)}</div>
        <div class="det-badges">
          <span class="rbadge ${esc(u.role)}">${roleLabel(u.role)}</span>
          ${typeTag(u.damage_type, DMG_COLOR)}
          ${typeTag(u.armor_type,  ARM_COLOR)}
        </div>
      </div>
    </div>
    ${u.description ? `<p class="det-desc">${esc(u.description)}</p>` : ''}
    <div class="sec-lbl">Stats</div>
    <div class="stat-rows">${statsHtml}</div>
    ${costParts.length ? `<div class="det-costs">${costParts.join('')}</div>` : ''}
  `;

  document.getElementById('det-panel').scrollTop = 0;
  document.getElementById('backdrop').classList.add('open');
}

function closeDetail() {
  document.getElementById('backdrop').classList.remove('open');
}

function onBackdropClick(e) {
  if (e.target === document.getElementById('backdrop')) closeDetail();
}

// ── Event wiring ───────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', (e) => {
  searchQ = e.target.value.trim();
  render();
});

document.querySelectorAll('.pill[data-f]').forEach((pill) => {
  pill.addEventListener('click', () => {
    const f = pill.dataset.f;
    const v = pill.dataset.v;
    filters[f] = v;
    document.querySelectorAll(`.pill[data-f="${f}"]`).forEach((p) => {
      const colorClass = p.dataset.v === 'defender' ? 'r-blue' :
                         p.dataset.v === 'hybrid'   ? 'r-teal' : '';
      p.classList.toggle('active', p.dataset.v === v);
      if (p.classList.contains('active') && colorClass) {
        p.classList.add(colorClass);
      } else {
        p.classList.remove('r-blue', 'r-teal');
      }
    });
    render();
  });
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDetail();
});

// ── Boot ───────────────────────────────────────────────────────────────────────
loadUnits();
</script>
</body>
</html>
